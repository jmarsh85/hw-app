<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

  <!-- PWA / iOS home screen -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Happy Wife" />
  <meta name="theme-color" content="#0c0a08" />

  <!-- Standard PWA manifest -->
  <link rel="manifest" href="/manifest.json" />

  <!-- iOS home screen icons -->
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />

  <!-- Fonts — loaded here so Vite doesn't try to bundle them -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Mono:wght@300;400&display=swap"
    rel="stylesheet"
  />

  <title>Happy Wife</title>

  <style>
    /* Prevent flash of unstyled background before React mounts */
    html, body, #root {
      margin: 0;
      padding: 0;
      background: #0c0a08;
      min-height: 100%;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
